{% extends 'base.html' %}

{% block content %}

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;flex-wrap:wrap;gap:15px;">

    <h1 style="color:#6a0dad;">
        🎓 Barcha Kurslar
    </h1>

    <a href="{% url 'course_create' %}" class="btn">
        ➕ Kurs qo'shish
    </a>

</div>

<div class="courses-grid">

    {% for course in courses %}

    <div class="course-card">

        <img src="{{ course.image.url }}" alt="{{ course.title }}">

        <div class="course-content">

            <h3>{{ course.title }}</h3>

            <p class="price">
                💰 {{ course.price }} so'm
            </p>

            <a href="{% url 'course_detail' course.slug %}" class="btn">
                Ko'rish
            </a>

        </div>

    </div>

    {% empty %}

    <div class="card">
        <h3>Kurslar mavjud emas</h3>
    </div>

    {% endfor %}

</div>

<style>

.courses-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:25px;
}

.course-card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
    transition:.3s;
}

.course-card:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.course-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.course-content{
    padding:20px;
}

.course-content h3{
    margin-bottom:15px;
    color:#333;
}

.price{
    color:#6a0dad;
    font-weight:700;
    font-size:18px;
    margin-bottom:20px;
}

</style>

{% endblock %}
