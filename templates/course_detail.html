{% extends 'base.html' %}

{% block content %}

<div class="card" style="max-width:900px;margin:auto;">

    <img
        src="{{ course.image.url }}"
        alt="{{ course.title }}"
        style="
        width:100%;
        height:450px;
        object-fit:cover;
        border-radius:15px;
        margin-bottom:25px;
        "
    >

    <h1 style="color:#6a0dad;margin-bottom:15px;">
        {{ course.title }}
    </h1>

    <p style="
        color:#555;
        line-height:1.8;
        font-size:17px;
        margin-bottom:20px;
    ">
        {{ course.description }}
    </p>

    <hr style="margin:20px 0;border:none;border-top:1px solid #eee;">

    <div style="
        display:flex;
        justify-content:space-between;
        flex-wrap:wrap;
        gap:15px;
        margin-bottom:25px;
    ">

        <h3>
            💰 Narxi: {{ course.price }}
        </h3>

        <h3>
            👨‍🏫 O'qituvchi:
            {{ course.teacher.user.username }}
        </h3>

    </div>

    <div style="
        display:flex;
        gap:15px;
        flex-wrap:wrap;
    ">

        <a
            href="{% url 'course_update' course.slug %}"
            class="btn"
        >
            ✏️ Tahrirlash
        </a>

        <a
            href="{% url 'course_delete' course.slug %}"
            style="
            background:#dc2626;
            color:white;
            padding:12px 20px;
            border-radius:10px;
            text-decoration:none;
            font-weight:600;
            "
        >
            🗑 O'chirish
        </a>

    </div>

</div>

{% endblock %}
