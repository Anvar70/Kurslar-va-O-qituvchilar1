{% extends 'base.html' %}

{% block content %}

<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
">

    <h1 style="color:#6a0dad;">
        👨‍🏫 O'qituvchilar
    </h1>

</div>

<div class="teachers-grid">

    {% for teacher in teachers %}

    <div class="teacher-card">

        <img
            src="{{ teacher.avatar.url }}"
            alt="{{ teacher.user.username }}"
        >

        <div class="teacher-content">

            <h3>
                {{ teacher.user.username }}
            </h3>

            <p class="experience">
                🎓 {{ teacher.experience_years }} yil tajriba
            </p>

            <a
                class="btn"
                href="{% url 'teacher_detail' teacher.id %}">
                Ko'rish
            </a>

        </div>

    </div>

    {% empty %}

    <div class="card">
        <h3>O'qituvchilar topilmadi</h3>
    </div>

    {% endfor %}

</div>

<style>

.teachers-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:25px;
}

.teacher-card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
    transition:.3s;
}

.teacher-card:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.teacher-card img{
    width:100%;
    height:280px;
    object-fit:cover;
}

.teacher-content{
    padding:20px;
}

.teacher-content h3{
    color:#333;
    margin-bottom:10px;
}

.experience{
    color:#6a0dad;
    font-weight:600;
    margin-bottom:20px;
}

</style>

{% endblock %}
