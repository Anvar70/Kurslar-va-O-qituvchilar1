{% extends 'base.html' %}

{% block content %}

<div class="teacher-profile">

    <img
        src="{{ teacher.avatar.url }}"
        alt="{{ teacher.user.username }}"
        class="teacher-avatar"
    >

    <h1>
        👨‍🏫 {{ teacher.user.username }}
    </h1>

    <div class="experience-badge">
        🎓 {{ teacher.experience_years }} yil tajriba
    </div>

    <div class="bio-card">
        <h3>O'qituvchi haqida</h3>

        <p>
            {{ teacher.bio }}
        </p>
    </div>

</div>

<style>

.teacher-profile{
    max-width:800px;
    margin:30px auto;
    text-align:center;
}

.teacher-avatar{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:50%;
    border:6px solid #6a0dad;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.teacher-profile h1{
    margin-top:25px;
    color:#6a0dad;
}

.experience-badge{
    display:inline-block;
    margin-top:15px;
    background:#f3e8ff;
    color:#6a0dad;
    padding:12px 20px;
    border-radius:30px;
    font-weight:600;
}

.bio-card{
    margin-top:30px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
    text-align:left;
}

.bio-card h3{
    color:#6a0dad;
    margin-bottom:15px;
}

.bio-card p{
    color:#555;
    line-height:1.8;
    font-size:17px;
}

</style>

{% endblock %}
